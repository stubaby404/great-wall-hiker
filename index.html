<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Wall Hiker - Beijing Edition</title>
    <style>
        /* CSS Flexbox & Mobile Responsive Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #FFF3DD; /* Antiqued Cream */
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { 
            color: #8B0000; /* Imperial Red */
            text-align: center; 
            border-bottom: 2px solid #D4AF37; /* Gold */
            padding-bottom: 10px;
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: white; 
            border: 2px solid #D4AF37;
            border-radius: 10px; 
            padding: 20px; 
            width: 100%; 
            max-width: 400px;
            text-align: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input { 
            padding: 10px; 
            font-size: 16px; 
            width: 70%; 
            margin-bottom: 15px; 
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
        button {
            background-color: #8B0000; 
            color: white; 
            border: none;
            padding: 12px 20px; 
            font-size: 16px; 
            border-radius: 5px; 
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #660000; }
        
        /* The SVG Map Styling */
        .map-container {
            width: 100%;
            margin-top: 20px;
            background-image: url('W020231123516459434484 2.jpg'); /* Your local file */
            background-size: 100% 100%; /* Forces the map to stretch exactly to the SVG boundaries */
            background-repeat: no-repeat;
            border-radius: 10px;
            border: 2px solid #D4AF37;
            position: relative;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
        .map-text {
            font-size: 12px;
            font-weight: bold;
            fill: #8B0000;
        }
        
        #milestone-alert {
            display: none; 
            background-color: #8B0000; 
            color: white;
            padding: 20px; 
            border-radius: 10px; 
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #D4AF37;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 class="header">Beijing Wall Challenge</h1>
    
    <div class="card">
        <h2>Log Your Daily Steps</h2>
        
        <input type="number" id="stepInput" placeholder="Enter steps (e.g., 5000)">
        
        <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 15px;">
            <button onclick="logSteps()">Submit</button>
            <button onclick="resetSteps()" style="background-color: #666;">Reset</button>
        </div>

        <h3>Total Distance: <span id="distanceDisplay">0.00</span> / 50 km</h3>

        <div class="map-container">
            <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto;">
                
                <path d="M 120 620 L 150 630 L 170 600 L 210 500 L 260 480 L 320 440 L 370 480 L 410 460 L 460 490 L 520 450 L 560 470 L 610 370 L 660 360 L 710 370 L 750 480 L 790 510 L 850 560" 
                      stroke="rgba(0,0,0,0.3)" stroke-width="8" fill="none" stroke-linejoin="round"/>
                
                <path id="progressPath" d="M 120 620 L 150 630 L 170 600 L 210 500 L 260 480 L 320 440 L 370 480 L 410 460 L 460 490 L 520 450 L 560 470 L 610 370 L 660 360 L 710 370 L 750 480 L 790 510 L 850 560" 
                      stroke="#D4AF37" stroke-width="10" fill="none" stroke-linejoin="round"/>
                
                <circle cx="120" cy="620" r="10" fill="#8B0000" stroke="#fff" stroke-width="3" />
                <text x="70" y="650" class="map-text" style="font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px white;">Start</text>

                <circle cx="320" cy="440" r="10" fill="#8B0000" stroke="#fff" stroke-width="3" />
                <text x="280" y="420" class="map-text" style="font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px white;">Badaling</text>

                <circle cx="520" cy="450" r="10" fill="#8B0000" stroke="#fff" stroke-width="3" />
                <text x="470" y="430" class="map-text" style="font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px white;">Mutianyu</text>

                <circle cx="660" cy="360" r="10" fill="#8B0000" stroke="#fff" stroke-width="3" />
                <text x="640" y="335" class="map-text" style="font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px white;">Simatai</text>
            </svg>
        </div>
    </div>

    <div id="milestone-alert">
        <h2 id="milestone-title" style="margin-top: 0; color: #D4AF37;">Milestone!</h2>
        <p id="milestone-text"></p>
    </div>

    <script>
        // --- CONSTANTS ---
        const KM_PER_STEP = 0.00076;
        const TOTAL_CHALLENGE_KM = 50; 

        // --- DATA HANDLING ---
        let currentKm = parseFloat(localStorage.getItem('greatWallDistance')) || 0;

        setupMap();
        updateUI();

        // Sets up the hidden CSS magic for the SVG line
        function setupMap() {
            let path = document.getElementById('progressPath');
            let length = path.getTotalLength();
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length; 
            path.style.transition = "stroke-dashoffset 1s ease-in-out"; 
        }

        // --- CORE ALGORITHMS ---
        function logSteps() {
            let stepInput = document.getElementById('stepInput').value;
            let steps = parseInt(stepInput);

            if (steps > 0) {
                let kmWalked = steps * KM_PER_STEP;
                currentKm += kmWalked;

                localStorage.setItem('greatWallDistance', currentKm);

                updateUI();
                checkMilestones(currentKm);
                
                document.getElementById('stepInput').value = ''; 
            } else {
                alert("Please enter a valid number of steps!");
            }
        }

        // --- NEW RESET FEATURE ---
        function resetSteps() {
            if(confirm("Are you sure you want to restart your journey? All progress will be lost.")) {
                currentKm = 0;
                localStorage.setItem('greatWallDistance', 0);
                updateUI();
                document.getElementById('milestone-alert').style.display = "none"; // Hide any active pop-ups
            }
        }

        function updateUI() {
            let displayKm = currentKm > TOTAL_CHALLENGE_KM ? TOTAL_CHALLENGE_KM : currentKm;
            document.getElementById('distanceDisplay').innerText = displayKm.toFixed(2);

            let path = document.getElementById('progressPath');
            let length = path.getTotalLength();
            let progressPercent = displayKm / TOTAL_CHALLENGE_KM;
            
            let drawLength = length - (length * progressPercent);
            path.style.strokeDashoffset = drawLength;
        }

        function checkMilestones(distance) {
            let alertBox = document.getElementById('milestone-alert');
            let title = document.getElementById('milestone-title');
            let text = document.getElementById('milestone-text');

            if (distance >= 50) {
                alertBox.style.display = "block";
                title.innerText = "50 km: Simatai Section!";
                text.innerText = "Challenge Complete! You have reached Simatai. Known for its steepness, this section overlooks the Miyun Reservoir.";
            } else if (distance >= 30 && distance < 31) { 
                alertBox.style.display = "block";
                title.innerText = "30 km: Mutianyu Section!";
                text.innerText = "You have reached Mutianyu! Famous for its dense concentration of watchtowers.";
            } else if (distance >= 15 && distance < 16) {
                alertBox.style.display = "block";
                title.innerText = "15 km: Badaling Pass!";
                text.innerText = "Welcome to Badaling. Built in 1504, this was a vital military outpost.";
            } else if (distance >= 1 && distance < 2) {
                alertBox.style.display = "block";
                title.innerText = "1 km: Mentougou District";
                text.innerText = "Your journey begins in the rugged western mountains of Beijing!";
            } else {
                alertBox.style.display = "none";
            }
        }
    </script>

</body>
</html>
