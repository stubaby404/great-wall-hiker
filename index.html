<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Wall Hiker - Beijing Edition</title>
    <style>
        /* CSS Flexbox & Mobile Responsive Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #FFF3DD; 
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { 
            color: #8B0000; 
            text-align: center; 
            border-bottom: 2px solid #D4AF37; 
            padding-bottom: 10px;
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: white; 
            border: 2px solid #D4AF37;
            border-radius: 10px; 
            padding: 20px; 
            width: 100%; 
            max-width: 400px;
            text-align: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input { 
            padding: 10px; 
            font-size: 16px; 
            width: 70%; 
            margin-bottom: 15px; 
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
        button {
            background-color: #8B0000; 
            color: white; 
            border: none;
            padding: 12px 20px; 
            font-size: 16px; 
            border-radius: 5px; 
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #660000; }
        
        /* The SVG Map Styling */
        .map-container {
            width: 100%;
            margin-top: 20px;
            background-image: url('W020231123516459434484 2.jpg'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            border-radius: 10px;
            border: 2px solid #D4AF37;
            position: relative;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
        .map-text {
            font-size: 14px;
            font-weight: bold;
            fill: #8B0000;
        }
        
        #milestone-alert {
            display: block; /* Default to showing the starting message */
            background-color: #8B0000; 
            color: white;
            padding: 20px; 
            border-radius: 10px; 
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #D4AF37;
            text-align: center;
        }
        #milestone-text {
            font-size: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1 class="header">Beijing Wall Challenge</h1>
    
    <div class="card">
        <h2>Log Your Daily Steps</h2>
        
        <input type="number" id="stepInput" placeholder="Enter steps (e.g., 5000)">
        
        <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 15px;">
            <button onclick="logSteps()">Submit</button>
            <button onclick="resetSteps()" style="background-color: #666;">Reset</button>
        </div>

        <h3>Total Distance: <span id="distanceDisplay">0.00</span> / 50 km</h3>

        <div class="map-container">
            <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
                
                <path d="M 180 720 L 210 690 L 230 640 L 280 530 L 300 490 L 340 540 L 390 500 L 450 480 L 520 490 L 570 470 L 610 410 L 640 380 L 720 360 L 790 440 L 830 530" 
                      stroke="rgba(0,0,0,0.3)" stroke-width="8" fill="none" stroke-linejoin="round"/>
                
                <path id="progressPath" d="M 180 720 L 210 690 L 230 640 L 280 530 L 300 490 L 340 540 L 390 500 L 450 480 L 520 490 L 570 470 L 610 410 L 640 380 L 720 360 L 790 440 L 830 530" 
                      stroke="#D4AF37" stroke-width="10" fill="none" stroke-linejoin="round"/>
                
                <circle cx="180" cy="720" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="210" cy="690" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="230" cy="640" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="280" cy="530" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="300" cy="490" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="340" cy="540" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="390" cy="500" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="450" cy="480" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="520" cy="490" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="570" cy="470" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="610" cy="410" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="640" cy="380" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="720" cy="360" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="790" cy="440" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <circle cx="830" cy="530" r="8" fill="#8B0000" stroke="#fff" stroke-width="2" /> <text x="120" y="750" class="map-text" style="text-shadow: 2px 2px 4px white;">Start (0km)</text>
                <text x="220" y="470" class="map-text" style="text-shadow: 2px 2px 4px white;">Badaling (14km)</text>
                <text x="400" y="450" class="map-text" style="text-shadow: 2px 2px 4px white;">Mutianyu (26km)</text>
                <text x="590" y="350" class="map-text" style="text-shadow: 2px 2px 4px white;">Simatai (42km)</text>
                <text x="780" y="560" class="map-text" style="text-shadow: 2px 2px 4px white;">Finish (50km)</text>
            </svg>
        </div>
    </div>

    <div id="milestone-alert">
        <h2 id="milestone-title" style="margin-top: 0; color: #D4AF37;">Milestone!</h2>
        <p id="milestone-text"></p>
    </div>

    <script>
        // --- CONSTANTS ---
        const KM_PER_STEP = 0.00076;
        const TOTAL_CHALLENGE_KM = 50; 

        // --- DATA HANDLING ---
        let currentKm = parseFloat(localStorage.getItem('greatWallDistance')) || 0;

        setupMap();
        updateUI();
        checkMilestones(currentKm); // Initialize the correct text on load

        function setupMap() {
            let path = document.getElementById('progressPath');
            let length = path.getTotalLength();
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length; 
            path.style.transition = "stroke-dashoffset 1s ease-in-out"; 
        }

        // --- CORE ALGORITHMS ---
        function logSteps() {
            let stepInput = document.getElementById('stepInput').value;
            let steps = parseInt(stepInput);

            if (steps > 0) {
                let kmWalked = steps * KM_PER_STEP;
                currentKm += kmWalked;

                localStorage.setItem('greatWallDistance', currentKm);

                updateUI();
                checkMilestones(currentKm);
                
                document.getElementById('stepInput').value = ''; 
            } else {
                alert("Please enter a valid number of steps!");
            }
        }

        function resetSteps() {
            if(confirm("Are you sure you want to restart your journey? All progress will be lost.")) {
                currentKm = 0;
                localStorage.setItem('greatWallDistance', 0);
                updateUI();
                checkMilestones(currentKm); // Resets back to the start message
            }
        }

        function updateUI() {
            let displayKm = currentKm > TOTAL_CHALLENGE_KM ? TOTAL_CHALLENGE_KM : currentKm;
            document.getElementById('distanceDisplay').innerText = displayKm.toFixed(2);

            let path = document.getElementById('progressPath');
            let length = path.getTotalLength();
            let progressPercent = displayKm / TOTAL_CHALLENGE_KM;
            
            let drawLength = length - (length * progressPercent);
            path.style.strokeDashoffset = drawLength;
        }

        // --- CONTINUOUS STAGE LOGIC (Fixed) ---
        function checkMilestones(distance) {
            let title = document.getElementById('milestone-title');
            let text = document.getElementById('milestone-text');

            if (distance >= 50) {
                title.innerText = "50 km: Jiangjunguan (Finish!)";
                text.innerText = "Challenge Complete! You have reached Jiangjunguan, the easternmost pass of the Beijing Great Wall. Marked by ancient rock carvings from Ming generals, this signifies the end of the capital's defensive line. You have defended the empire!";
            } else if (distance >= 48) {
                title.innerText = "48 km: Miyun Reservoir Overlook";
                text.innerText = "As you near the end of your journey, the ancient Ming bricks overlook the Miyun Reservoir. This highlights a beautiful juxtaposition: the ancient defensive lifeline of the empire looking down upon the modern water lifeline of modern Beijing.";
            } else if (distance >= 45) {
                title.innerText = "45 km: Wangjinglou (Watching Beijing Tower)";
                text.innerText = "You have reached Wangjinglou, the highest watchtower in the Simatai range at 986 meters above sea level. From this precise point, Ming sentries could light smoke and fire signals that could be seen directly by the Emperor's guards in Beijing.";
            } else if (distance >= 42) {
                title.innerText = "42 km: Simatai Section";
                text.innerText = "You have conquered the perilous Simatai! Renowned for its Heavenly Ladder section (climbing at an 85-degree angle), this is the only section of the Great Wall authorized by UNESCO to retain its original, un-restored Ming Dynasty appearance.";
            } else if (distance >= 38) {
                title.innerText = "38 km: Jinshanling Section";
                text.innerText = "Welcome to Jinshanling, an architectural masterpiece redesigned by the legendary General Qi Jiguang. It features unique barrier walls built on top of the main wall to protect defenders from enemy arrows if the wall was ever breached.";
            } else if (distance >= 34) {
                title.innerText = "34 km: Gubeikou Pass";
                text.innerText = "You are standing on Gubeikou, a site of immense bloodshed. Because it sits on the easiest northern route into the central plains, historians record over 130 major battles occurring right where you are standing throughout Chinese history.";
            } else if (distance >= 30) {
                title.innerText = "30 km: Baimaguan (White Horse Pass)";
                text.innerText = "Welcome to Baimaguan. Unlike the massive brick fortresses, this lesser-known strategic bottleneck was guarded by elite Ming cavalry units. The terrain here was specifically modified to give horsemen the advantage in quick counter-attacks.";
            } else if (distance >= 26) {
                title.innerText = "26 km: Mutianyu Section";
                text.innerText = "You've reached Mutianyu! Originally built in the 6th century and expanded by Ming General Xu Da, it features a highly unusual 22 watchtowers crammed into just a 2-kilometer stretch, allowing for devastating crossfire against attackers.";
            } else if (distance >= 22) {
                title.innerText = "22 km: Jiankou (The Arrow Nock)";
                text.innerText = "You are navigating Jiankou, notorious for its terrifyingly steep dolomite cliffs. Built on nearly vertical ridges, this wild section stands as a testament to the sheer engineering willpower of Ming builders who refused to leave any mountain unprotected.";
            } else if (distance >= 18) {
                title.innerText = "18 km: Huanghuacheng (The Water Wall)";
                text.innerText = "You are at Huanghuacheng, famous for its sections that plunge directly into a lake. Historically, this heavily armed sector was built with a secondary, secret purpose: protecting the sacred Ming Tombs located just to the south.";
            } else if (distance >= 14) {
                title.innerText = "14 km: Badaling Pass";
                text.innerText = "You have reached Badaling! Constructed in 1504, this was the ultimate military stronghold protecting the capital. Its walls were built with massive granite slabs and specialized firing holes, making it an impenetrable fortress during the Ming Dynasty.";
            } else if (distance >= 10) {
                title.innerText = "10 km: Shuiguan (The Water Pass)";
                text.innerText = "Welcome to Shuiguan. Unlike mountain-ridge walls, this section was built directly across a V-shaped river valley. Its massive stone arches allowed water to flow through while heavily armed Ming soldiers could trap and ambush enemies attempting to wade across.";
            } else if (distance >= 6) {
                title.innerText = "6 km: Juyongguan Pass";
                text.innerText = "You have arrived at Juyongguan, one of the Three Great Passes of the Great Wall. This heavily fortified valley was the direct gateway to Beijing. It features the famous Cloud Platform, a marble gate carved with protective Buddhist sutras.";
            } else if (distance >= 3) {
                title.innerText = "3 km: Yanhecheng Garrison";
                text.innerText = "You have reached Yanhecheng, a vital Ming Dynasty garrison village. Built strategically along the Yongding River gorge, this fortress housed the soldiers who guarded the narrow river valleys—the easiest paths for enemies to bypass the mountains.";
            } else {
                title.innerText = "0 km: Mentougou District (Start)";
                text.innerText = "Your journey begins in the rugged western mountains of Beijing. During the Ming Dynasty, this treacherous terrain served as the capital's first natural line of defense against invading nomadic cavalry from the northwest.";
            }
        }
    </script>

</body>
</html>
