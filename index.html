<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Wall Hiker - Beijing Edition</title>
    <style>
        /* CSS Flexbox & Mobile Responsive Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #FFF3DD; /* Antiqued Cream */
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { 
            color: #8B0000; /* Imperial Red */
            text-align: center; 
            border-bottom: 2px solid #D4AF37; /* Gold */
            padding-bottom: 10px;
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: white; 
            border: 2px solid #D4AF37;
            border-radius: 10px; 
            padding: 20px; 
            width: 100%; 
            max-width: 400px;
            text-align: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input { 
            padding: 10px; 
            font-size: 16px; 
            width: 70%; 
            margin-bottom: 15px; 
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #8B0000; 
            color: white; 
            border: none;
            padding: 12px 20px; 
            font-size: 16px; 
            border-radius: 5px; 
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #660000; }
        
        /* The New SVG Map Styling */
        .map-container {
            width: 100%;
            margin-top: 20px;
            background-image: url('W020231123516459434484 2.jpg');
            background-size: 100% 100%; /* Forces the map to stretch exactly to the SVG boundaries */
            background-repeat: no-repeat;
            border-radius: 10px;
            border: 2px solid #D4AF37;
            position: relative;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
        }
        .map-text {
            font-size: 12px;
            font-weight: bold;
            fill: #8B0000;
        }
        
        #milestone-alert {
            display: none; 
            background-color: #8B0000; 
            color: white;
            padding: 20px; 
            border-radius: 10px; 
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #D4AF37;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 class="header">Beijing Wall Challenge</h1>
    
    <div class="card">
        <h2>Log Your Daily Steps</h2>
        <input type="number" id="stepInput" placeholder="Enter steps (e.g., 5000)">
        <button onclick="logSteps()">Submit</button>

        <h3>Total Distance: <span id="distanceDisplay">0.00</span> / 50 km</h3>

        <div class="map-container">
            <svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: auto;">
                
                <path d="M 175 755 L 220 720 L 260 670 L 310 540 L 315 470 L 360 410 L 430 400 L 460 450 L 510 470 L 550 420 L 600 450 L 640 400 L 650 340 L 730 310 L 770 330 L 800 450 L 830 520" 
                      stroke="rgba(0,0,0,0.3)" stroke-width="8" fill="none" stroke-linejoin="round"/>
                
                <path id="progressPath" d="M 175 755 L 220 720 L 260 670 L 310 540 L 315 470 L 360 410 L 430 400 L 460 450 L 510 470 L 550 420 L 600 450 L 640 400 L 650 340 L 730 310 L 770 330 L 800 450 L 830 520" 
                      stroke="#D4AF37" stroke-width="10" fill="none" stroke-linejoin="round"/>
                
                <circle cx="175" cy="755" r="10" fill="#8B0000" stroke="#fff" stroke-width="3" />
                <text x="130" y="785" class="map-text" style="font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px white;">Start (0km)</text>

                <circle cx="360" cy="410" r="10" fill="#8B0000" stroke="#fff" stroke-width="3" />
                <text x="310" y="390" class="map-text" style="font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px white;">Badaling (15km)</text>

                <circle cx="550" cy="420" r="10" fill="#8B0000" stroke="#fff" stroke-width="3" />
                <text x="510" y="450" class="map-text" style="font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px white;">Mutianyu (30km)</text>

                <circle cx="650" cy="340" r="10" fill="#8B0000" stroke="#fff" stroke-width="3" />
                <text x="665" y="335" class="map-text" style="font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px white;">Simatai (50km)</text>
            </svg>
        </div>
    </div>

    <div id="milestone-alert">
        <h2 id="milestone-title" style="margin-top: 0; color: #D4AF37;">Milestone!</h2>
        <p id="milestone-text"></p>
    </div>

    <script>
        // --- CONSTANTS ---
        const KM_PER_STEP = 0.00076;
        const TOTAL_CHALLENGE_KM = 50; // Changed to a 50km Beijing scope!

        // --- DATA HANDLING ---
        let currentKm = parseFloat(localStorage.getItem('greatWallDistance')) || 0;

        // Initialize UI on page load
        setupMap();
        updateUI();

        // Sets up the hidden CSS magic for the SVG line
        function setupMap() {
            let path = document.getElementById('progressPath');
            let length = path.getTotalLength();
            // Prepare the SVG path for drawing
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length; // Start totally hidden
            path.style.transition = "stroke-dashoffset 1s ease-in-out"; // Smooth animation
        }

        // --- ABSTRACTION: Main function ---
        function logSteps() {
            let stepInput = document.getElementById('stepInput').value;
            let steps = parseInt(stepInput);

            if (steps > 0) {
                // Math conversion
                let kmWalked = steps * KM_PER_STEP;
                currentKm += kmWalked;

                // Save new distance
                localStorage.setItem('greatWallDistance', currentKm);

                updateUI();
                checkMilestones(currentKm);
                
                document.getElementById('stepInput').value = ''; 
            } else {
                alert("Please enter a valid number of steps!");
            }
        }

        function updateUI() {
            // Cap visual progress at the challenge max so it doesn't break
            let displayKm = currentKm > TOTAL_CHALLENGE_KM ? TOTAL_CHALLENGE_KM : currentKm;
            document.getElementById('distanceDisplay').innerText = displayKm.toFixed(2);

            // Update the winding map path
            let path = document.getElementById('progressPath');
            let length = path.getTotalLength();
            let progressPercent = displayKm / TOTAL_CHALLENGE_KM;
            
            // Draw the line by reducing the offset
            let drawLength = length - (length * progressPercent);
            path.style.strokeDashoffset = drawLength;
        }

        // --- ALGORITHMS: Conditional Logic ---
        function checkMilestones(distance) {
            let alertBox = document.getElementById('milestone-alert');
            let title = document.getElementById('milestone-title');
            let text = document.getElementById('milestone-text');

            if (distance >= 50) {
                alertBox.style.display = "block";
                title.innerText = "50 km: Badaling Watchtower!";
                text.innerText = "Challenge Complete! You have conquered the Badaling section, the jewel of the Ming Dynasty defenses.";
            } else if (distance >= 25 && distance < 26) { // triggers near the middle point
                alertBox.style.display = "block";
                title.innerText = "25 km: Mutianyu Section!";
                text.innerText = "You're halfway there! Mutianyu is famous for its dense watchtowers and stunning forest views.";
            } else if (distance >= 1 && distance < 2) {
                alertBox.style.display = "block";
                title.innerText = "1 km: The First Steps!";
                text.innerText = "A journey of a thousand miles begins with a single step. Keep going!";
            } else {
                alertBox.style.display = "none";
            }
        }
    </script>

</body>
</html>
